name: Scan Flight Deals

on:
  schedule:
    - cron: "0 */6 * * *"  # every 6 hours — change this one line to adjust cadence
  workflow_dispatch:        # manual run button in GitHub Actions UI

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install typing-extensions
          python -m pip install fast-flights

      - name: Run scanner
        run: python scanner.py

      - name: Commit updated data files
        run: |
          git config user.name  "faredrop-bot"
          git config user.email "faredrop-bot@users.noreply.github.com"
          git add deals.json deals.js history.json
          git commit -m "update deals $(date -u '+%Y-%m-%dT%H:%M:%SZ')" || echo "no changes to commit"
          git push
